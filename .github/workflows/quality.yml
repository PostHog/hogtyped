name: Code Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Check code formatting
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: '3.11'

      - name: Install formatters
        run: |
          # TypeScript/JavaScript
          npm install -g prettier

          # Python
          pip install black isort

      - name: Check TypeScript formatting
        run: |
          cd packages/js
          npx prettier --check "src/**/*.{ts,js,json}"

      - name: Check Python formatting
        run: |
          cd packages/python
          black --check hogtyped/
          isort --check-only hogtyped/

  # Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: javascript, python

      - name: Run npm audit
        run: |
          cd packages/js
          npm audit --production || true

      - name: Run pip audit
        run: |
          pip install pip-audit
          cd packages/python
          pip-audit || true

  # Check for common issues
  lint-pr:
    name: Lint PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for large files
        run: |
          # Fail if any file is larger than 1MB
          find . -type f -size +1M -exec ls -lh {} \; | tee /tmp/large_files.txt
          if [ -s /tmp/large_files.txt ]; then
            echo "❌ Large files detected:"
            cat /tmp/large_files.txt
            exit 1
          fi

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  # Documentation check
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Check for broken links in markdown
        uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368 # v1
        with:
          config-file: '.github/markdown-link-check.json'
          folder-path: '.'
          file-extension: '.md'

      - name: Check README examples are up to date
        run: |
          # Ensure examples in README match actual API
          grep -q "npx hogtyped generate" README.md || echo "⚠️ README missing TypeScript example"
          grep -q "python -m hogtyped generate" README.md || echo "⚠️ README missing Python example"
